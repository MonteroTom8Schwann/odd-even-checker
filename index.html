<!--
This website is an Odd or Even Number Checker application.
It allows users to input a number and instantly determine whether it is odd or even.

The purpose of this project is to demonstrate how HTML, CSS, and JavaScript 
work together to create a simple interactive web application.

HTML is used to structure the content, CSS is used for styling, 
and JavaScript is used to add functionality and logic to the program.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd or Even Checker</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
  }
  input {
    padding: 8px;
    width: 200px;
    margin-bottom: 10px;
  }
  button {
    padding: 8px 16px;
    cursor: pointer;
  }
  #result {
    margin-top: 15px;
    font-weight: bold;
    font-size: 1.2em;
  }
</style>
</head>
<body>

<h1>Odd or Even Checker</h1>
<p>Tom Russel G. Montero</p>
<p>STE Department</p>

<input type="number" id="num" placeholder="Enter number"><br>
<button onclick="check()">Check</button>

<p id="result">Result will appear here</p>

<script>
function check() {
  const n = document.getElementById("num").value;
  const result = document.getElementById("result");

  if (n === "") {
    result.innerText = "Please enter a number.";
  } else if (n % 2 === 0) {
    result.innerText = "EVEN";
  } else {
    result.innerText = "ODD";
  }
}
</script>

</body>
</html>

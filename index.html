<!--
This website is an Odd or Even Number Checker application.
It allows the user to enter a number and determine whether it is odd or even.
I created this website to demonstrate how HTML, CSS, and JavaScript work together to build an interactive webpage.
-->

<!DOCTYPE html>
<html>
<head>
<title>Odd or Even Checker</title>
<style>
body { 
  font-family: Arial; 
  text-align: center; 
  margin-top: 50px; 
}
input { 
  padding: 8px; 
  width: 60%; 
  margin-bottom: 10px; 
}
button { 
  padding: 8px 16px; 
  background: #3498db; 
  color: white; 
  border: none; 
  border-radius: 5px; 
}
#result { 
  margin-top: 15px; 
  font-weight: bold; 
}
</style>
</head>
<body>

<h1>Odd or Even Checker</h1>
<p>Tom Russel G. Montero</p>
<p>Jacinto P. Elpa National High School — STE Dept</p>

<input type="number" id="numberInput" placeholder="Enter number"><br>
<button onclick="checkNumber()">Check</button>
<p id="result"></p>

<script>
function checkNumber() {
  let n = document.getElementById("numberInput").value;

  if (n === "") {
    document.getElementById("result").innerText = "Please enter a number.";
    return;
  }

  if (n % 2 == 0) {
    document.getElementById("result").innerText = "EVEN";
  } else {
    document.getElementById("result").innerText = "ODD";
  }
}
</script>

</body>
</html>

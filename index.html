<!--
This website is an Odd or Even Number Checker application.
It allows users to input a number and instantly determine whether it is odd or even.

The purpose of this project is to demonstrate how HTML, CSS, and JavaScript 
work together to create a simple interactive web application.

HTML is used to structure the content, CSS is used for styling, 
and JavaScript is used to add functionality and logic to the program.
-->
<!DOCTYPE html>
<html>
<head>
<title>Odd or Even Checker</title>

<style>
body{
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}
input{
  padding: 8px;
  width: 60%;
  margin-bottom: 10px;
}
button{
  padding: 8px 16px;
  background: #3498db;
  color: #fff;
  border: none;
  border-radius: 5px;
}
#result{
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Odd or Even Checker</h1>
<p>Tom Russel G. Montero</p>
<p>STE Department</p>

<input type="number" id="num" placeholder="Enter number"><br>
<button>Check</button>

<p id="result">Result will appear here</p>

</body>
</html>
